# Base / prod compose. D-SB1-1: this file is the prod source of truth.
# It contains ollama, gutenberg-lab (jupyter), chat (port 8890),
# admin (port 8891). All three app services share the same SHA-pinned
# image (D-SB2-1). It does NOT bind-mount code from the host — code is
# baked into the image via Dockerfile COPY (D-SB1-2).
#
# Dev convenience (bind-mount of ./scripts ./tests etc.) lives in
# docker-compose.dev.yml. Per D-SB1-7 it is NOT auto-applied; bare
# `docker compose up` loads only this file (prod). Dev opts in
# explicitly via `-f docker-compose.yml -f docker-compose.dev.yml` or
# `COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml` in .env.
#
# Supervision: chat / admin run as PID-1 Python in their own containers
# (D-SB2-1 .. D-SB2-7). SIGTERM propagates natively; no `docker exec`,
# no `pkill`. systemd no longer manages them — Docker / compose is the
# only supervisor.
#
# See docs/v2/decisions.md → 2026-05-24 S-B1 + S-B2.

# --- shared bits for the three app services (D-SB2-1) ---
# These x-* extension fields are ignored by compose; the YAML anchors
# they define are referenced by services: below.

x-app-image: &app-image
  wordcracker-textlab:${WC_IMAGE_TAG:?WC_IMAGE_TAG must be set (export it, write .env, or run scripts/deploy.sh)}

x-app-env: &app-env
  OLLAMA_HOST: http://ollama:11434
  ASSISTANT_NAME: Словоёб
  # Sprint 22+ alpha5 — Token Budget Layer override. Bump qwen3:14b
  # ctx from default 8192 to 16384 (~2× headroom). With this, the
  # Christie 200-word case fits comfortably without ladder shrink.
  # Lower budgeted utilization = lower confabulation risk.
  WC_OLLAMA_NUM_CTX: "16384"
  # Pins that used to live in systemd/wordcracker-chat.service.d/v2-engine.conf
  # (deleted in D-SB2-5). They are real, live model pins, not feature
  # flags — Phase 1 already collapsed the feature-flag landscape (R1).
  WC_LLM_MODEL: wordcracker:v2
  WC_CRITIC_MODEL: wordcracker:v2
  # ADR-F1 / D-SF1-2 (S-F1, 2026-05-25): snapshot the AST-fingerprint
  # registry at process start so prod canary observes a deterministic
  # cache-key set even if a module hot-reload happens mid-investigation.
  # Default in code is off (lazy lookup, one entry per cache miss); prod
  # opts in here so the warmup cost is paid once at startup. Local pytest
  # / dev compose leaves it unset (= "0").
  WC_CACHE_PIN_FINGERPRINT: "1"

x-app-volumes: &app-volumes
  # D-SB1-1 / D-SB2-1: only corpus / state bind-mounts in the prod base.
  # Code paths (./scripts, ./tests, ./notebooks, ./data, ./raw_books)
  # live under dev-only override. /data/* paths are large state on the
  # host disk; ADR-B2's "no bind-mount" rule explicitly excluded them.
  # /data/uploads is the admin write target (was implicit under
  # gutenberg-lab; promoted to an explicit bind-mount in D-SB2-1 so the
  # admin container can write to it).
  - /data/books:/workspace/books
  - /data/clean_books:/workspace/clean_books
  - /data/chroma_db:/workspace/chroma_db
  - /data/spgc:/workspace/spgc
  - /data/raw_text:/workspace/raw_text
  - /data/wodehouse_raw:/workspace/wodehouse_raw
  - /data/gutenberg_raw:/workspace/gutenberg_raw
  - /data/uploads:/workspace/uploads

services:
  ollama:
    # Pinned for reproducibility (S-P2): the num_ctx-thrash root cause was
    # diagnosed on the 0.24 runner (one KvSize per runner). `latest` could
    # silently change KvSize/reload semantics under us.
    image: ollama/ollama:0.24.0
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /data/ollama:/root/.ollama
    deploy:
      resources:
        # qwen3:14b lives in VRAM (~14 GB), the host RAM footprint of the ollama
        # serve process is tiny (~1 GB). 16 GB cap protects against runaway
        # mmap loading of a larger model someone might pull later.
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      # `ollama list` is built into the binary, hits the local API, and fails
      # if either GPU or API is degraded. wget/curl are NOT in the ollama
      # minimal image, so don't reach for them here.
      test: ["CMD-SHELL", "nvidia-smi -L >/dev/null 2>&1 && ollama list >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 90s

  gutenberg-lab:
    # Jupyter for notebook work. After S-B2 this is dev/analysis only —
    # chat (8890) and admin (8891) live in their own services below.
    # Memory cap reduced from 40 GB (pre-S-B2 single container) to 8 GB
    # (idle jupyter + ad-hoc analysis). chat/admin carry their own caps.
    image: *app-image
    container_name: gutenberg-lab
    build:
      context: .
      dockerfile: Dockerfile
      # ADR-B3 / D-SB3-1: forward GIT_SHA + BUILD_TIME to Dockerfile
      # for any path that bypasses `scripts/deploy.sh` (notably
      # `docker compose build` / `docker compose up --build` in dev).
      # Defaults to WC_IMAGE_TAG when set (deploy.sh always exports it)
      # and "unknown" otherwise — never silently empty.
      args:
        GIT_SHA: "${WC_IMAGE_TAG:-unknown}"
        BUILD_TIME: "${WC_BUILD_TIME:-unknown}"
    ports:
      - "8888:8888"
    environment: *app-env
    volumes: *app-volumes
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      sh -c "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --ServerApp.token='' --ServerApp.password=''
      --notebook-dir=/workspace"
    restart: unless-stopped

  chat:
    # D-SB2-1: PID 1 = python; SIGTERM propagates from `docker stop` /
    # compose recreate directly to the chat_server.py process. No
    # `docker exec`, no `pkill` orphan reap.
    image: *app-image
    container_name: wordcracker-chat
    command: ["python", "-u", "/workspace/scripts/chat_server.py", "--port", "8890"]
    environment: *app-env
    volumes: *app-volumes
    ports:
      - "8890:8890"
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        # Chat carries the LLM-facing path: rag_query + ChromaDB +
        # SentenceTransformer + v2 engine. Observed ~700 MB RSS post-warmup;
        # 28 GB cap is the pre-S-B2 gutenberg-lab share minus admin (4 GB)
        # and jupyter (8 GB). Same overall 40 GB ceiling, just split.
        limits:
          memory: 28G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      # D-SB2-7: native compose healthcheck replaces the systemd
      # ExecStartPost curl-loop (`for i in $(seq 1 30); do sleep 2;
      # curl ...; done`). Uses python urllib instead of curl to avoid
      # depending on curl being in the runtime layer of the image.
      #
      # S-B8: gate on /health.ready, NOT just HTTP 200. Since _warmup() now
      # runs in a background thread (chat_server.main binds the socket first),
      # /health answers 200 the moment the socket is up but reports
      # ready=false until warmup finishes. Gating on 200 alone would flip the
      # container "healthy" while still cold — routing traffic and satisfying
      # `depends_on: service_healthy` before the models are loaded. Parsing
      # ready=true is what keeps the old "healthy ⇒ warm" guarantee.
      #
      # 2.6.43 rollback-compat: b.get('ready', True) is the SAME version-
      # agnostic rule predeploy_probe_suite.wait_for_health already uses. An
      # S-B8+ image emits ready=false→true, so the "healthy ⇒ warm" gate stays
      # exactly as strict for every image that HAS a readiness concept. A
      # pre-S-B8 rollback target (e.g. baca1a8/2.6.37) serves /health JSON
      # WITHOUT a ready key — there 'ready' defaults to True so the old image
      # goes healthy on liveness instead of hanging 'starting' forever under
      # this newer healthcheck (the bug that made deploy.sh's rollback verify
      # poll_until_healthy time out and falsely report a 'bad state'). A
      # pre-B3 plain-text body ('ok', non-JSON) is likewise healthy on 200.
      # Only an explicit ready=false keeps it 'starting'. The forward-deploy
      # silent-success guard is unaffected: verify still requires JSON +
      # matching git_sha and the probe gate still waits for ready=true — the
      # healthcheck is the coarse signal, not the gate.
      test: ["CMD-SHELL", "python -c \"import urllib.request,json,sys; raw=urllib.request.urlopen('http://127.0.0.1:8890/health', timeout=2).read(); b=json.loads(raw) if raw.lstrip()[:1]==b'{' else {}; sys.exit(0 if b.get('ready', True) else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      # start_period sizes the background _warmup() in chat_server.main():
      # the socket binds immediately but ready=false until warmup loads the
      # models (ChromaDB + bi-encoder + BGE + spaCy + ollama) AND runs the
      # S-P2c-followup E6 page-cache touch-warm. The E11 find_book_by_topic
      # warm was REMOVED in 2.6.43 (agentic — dozens of renderers per call —
      # it drove _warmup past 600s without moving P11 and hung the 2.6.42
      # deploy). What remains: base model loads (~15-20s) + the E6 period_vocab
      # page-cache read (~6000 token files, ~180s cold; prod disk I/O does NOT
      # parallelise) ≈ ~200s honest warm. Budget set to 360s — ~1.8x the honest
      # warm, well below the old 600s yet clear of the ~200s worst case, in
      # step with verify's 360s poll budget and the probe suite's 360s
      # wait_for_health budget. start_period is a ceiling: a faster warm flips
      # ready (and the container "healthy") sooner.
      start_period: 360s

  admin:
    # D-SB2-1: PID 1 = python; admin is upload/index only — no LLM,
    # no ChromaDB at import time, so warmup is shorter.
    image: *app-image
    container_name: wordcracker-admin
    command: ["python", "-u", "/workspace/scripts/admin_server.py", "--port", "8891"]
    environment: *app-env
    volumes: *app-volumes
    ports:
      - "8891:8891"
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8891/health', timeout=2).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
