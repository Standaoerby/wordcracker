services:
  gutenberg-lab:
    # ADR-B1: image tag templated for deploy-by-SHA. The `:-latest`
    # fallback keeps current behaviour (deploys without WC_IMAGE_TAG
    # set continue to use :latest, same as before). Once phase 3
    # lands, the fallback is removed and WC_IMAGE_TAG becomes required.
    image: wordcracker-textlab:${WC_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
      - "8890:8890"
      - "8891:8891"
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
      - ./data:/workspace/data
      - ./raw_books:/workspace/raw_books
      - /data/books:/workspace/books
      - /data/clean_books:/workspace/clean_books
      - /data/chroma_db:/workspace/chroma_db
      - /data/spgc:/workspace/spgc
      - /data/raw_text:/workspace/raw_text
      - /data/wodehouse_raw:/workspace/wodehouse_raw
      - /data/gutenberg_raw:/workspace/gutenberg_raw
    deploy:
      resources:
        # cap RAM at 40 GB: ChromaDB hnsw (~5 GB) + sentence-transformers (~1 GB)
        # + chat_server + admin_server + jupyter + tools + ~10 GB headroom. Past
        # this the kernel kills the container instead of the host (previous OOM
        # event under unbounded memory took down SSH and required a hard reboot).
        limits:
          memory: 40G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      sh -c "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --ServerApp.token='' --ServerApp.password=''
      --notebook-dir=/workspace"
