name: predeploy

# W-18 pre-deploy gate (CI half). Runs the parts of the deploy gate
# that do NOT need a live chat endpoint:
#
#   - version-bump check vs the PR base (catches the 2026-05-24
#     failure mode: merge to main without ANALYTICS_VERSION moving)
#   - pytest tests/v2 collect (R10 — sweet must collect with 0 errors)
#   - probe-config sanity (12 probes, no __FILL_FROM_SOURCE__ slots,
#     `repeat` set on P12)
#
# The live 12-probe run happens on the deploy host via
# `scripts/predeploy_gate.sh` — it needs a reachable chat API, which a
# CI runner doesn't have.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version-bump:
    name: Mandatory version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the parent commit for `git show HEAD~1:...`.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Check ANALYTICS_VERSION moved
        run: |
          python scripts/check_version_bump.py \
            --against git --git-ref "${{ steps.base.outputs.ref }}"

  probe-config-sanity:
    name: 12-probe config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run W-18 unit tests (config shape, runner logic, version reader)
        run: |
          python -m pytest tests/v2/test_w18_predeploy_probe_suite.py \
                            tests/v2/test_w18_check_version_bump.py -q

  test-collect:
    name: pytest tests/v2 collect (R10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Collect tests/v2 (must be 0 collection errors per R10)
        run: |
          python -m pytest tests/v2 --collect-only -q

  s-b4-acceptance:
    # S-B4 (docs/v2/decisions.md → 2026-05-25 S-B4) acceptance tests.
    # Two behavioural tests in this suite are Windows-skipped because
    # they rely on bash + PATH-prepend mocks of `docker` / `curl`:
    #   - tests/v2/test_deploy_b4.py::test_stale_image_under_new_tag_fails_verify
    #     (the headline TZ acceptance — docker tag matches, /health.git_sha
    #      mismatches; verify must exit 7 / D-SB3-3 runtime mismatch)
    #   - tests/v2/test_deploy_b4.py::test_verify_fails_loud_when_no_arg_no_env
    #     (D-SB4-2 — verify refuses git-HEAD fallback)
    # Linux CI is the contract that those tests are NOT silently skipped.
    # -v shows each test as PASSED/SKIPPED so any unexpected skip is
    # visible in the run log.
    name: S-B4 acceptance (deploy contract + flag lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest + pyyaml
        run: pip install pytest pyyaml
      - name: Run S-B4 deploy contract + flag lint tests
        run: |
          python -m pytest tests/v2/test_deploy_b4.py tests/v2/test_flag_lint.py -v

  test-cache-race-linux:
    # POSIX-only contract: `os.replace` is atomic on Linux (rename(2)), so
    # the 4-writers-on-same-key race that `_write_disk` guards against (per
    # b8dd3ab + memory `project_cache_writer_pattern`) resolves cleanly with
    # unique `.tmp` per writer. Windows MoveFileExW can throw
    # ERROR_ACCESS_DENIED while another writer is mid-replace on the same
    # destination → the `CacheWriteDiskRaceSafe` class is `skipIf(win32)`
    # per D-S0-2. This job is the canonical Linux gate for that property
    # until the predeploy harness (ADR-B4 §1) runs the full suite.
    name: cache race safety (Linux POSIX rename atomicity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run CacheWriteDiskRaceSafe (must pass on POSIX)
        run: |
          python -m pytest tests/v2/test_cache_concurrent_writes.py -v
