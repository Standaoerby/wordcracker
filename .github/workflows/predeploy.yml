name: predeploy

# Pre-deploy CI gate. Runs the parts of the deploy contract that do
# NOT need a live chat endpoint:
#
#   - version-bump check vs the PR base (catches the 2026-05-24
#     failure mode: merge to main without ANALYTICS_VERSION moving)
#   - probe-config sanity (12 probes, no __FILL_FROM_SOURCE__ slots,
#     `repeat` set on P12)
#   - tests-v2 (R10): full requirements.lock install (S-B5 / ADR-B7,
#     docs/v2/decisions.md → 2026-05-25 S-B5) + `pytest tests/v2
#     --collect-only` (R10 gate) + `pytest tests/v2 -v` (full
#     directory run, not a hand-list). Replaces the pre-S-B5 jobs
#     `test-collect`, `s-b4-acceptance`, `test-cache-race-linux` —
#     each was running a 5-package install + a hand-curated subset,
#     so ~240 tests never executed on CI and the R10 gate was
#     decorative for 15 / 15 runs (gh run list, 2026-05-24..05-25).
#
# The live 12-probe run happens on the deploy host via
# `scripts/predeploy_gate.sh` — it needs a reachable chat API, which a
# CI runner doesn't have.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version-bump:
    name: Mandatory version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the parent commit for `git show HEAD~1:...`.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Check ANALYTICS_VERSION moved
        run: |
          python scripts/check_version_bump.py \
            --against git --git-ref "${{ steps.base.outputs.ref }}"

  probe-config-sanity:
    name: 12-probe config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run W-18 unit tests (config shape, runner logic, version reader)
        run: |
          python -m pytest tests/v2/test_w18_predeploy_probe_suite.py \
                            tests/v2/test_w18_check_version_bump.py -q

  tests-v2:
    # S-B5 / ADR-B7 (docs/v2/decisions.md → 2026-05-25 S-B5).
    #
    # Installs the SAME requirements.lock that the prod image bakes
    # (Dockerfile:39-41), plus the spaCy models the prod image pulls
    # by URL (Dockerfile:50-52). CI's dependency surface is now the
    # contract under test, not "whatever pip install pytest gives us
    # today." Runs:
    #
    #   1. pytest tests/v2 --collect-only  — R10 gate (must be 0
    #      collection errors). Separate step so the R10 signal is a
    #      distinct line in the run log.
    #   2. pytest tests/v2 -v              — full directory run. NOT
    #      a hand-curated list: new test files added under future
    #      blocks (S-F1…S-R4, etc.) get picked up automatically.
    #
    # Quarantines for tests that cannot pass on bare ubuntu-latest
    # (need GPU, the live SPGC corpus, a live Ollama, a live
    # persistent ChromaDB, etc.) are explicit @pytest.mark.skipif
    # calls inside the test files, each with reason= and a stated
    # follow-up. Silent-red is never accepted (R2). The complete
    # carantine list with reason + count lives in the S-B5 closeout
    # at the top of docs/v2/decisions.md.
    name: tests/v2 (R10 collect + full directory run)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space for the full lock install
        # requirements.lock pulls ~7 GB onto disk (torch 2.12 + the
        # nvidia-*-cu13 wheels — manylinux2014_x86_64 .so files that
        # install on any glibc Linux without a GPU; `import torch`
        # works, torch.cuda.is_available() returns False, GPU-dependent
        # tests skipif-out). ubuntu-latest ships with ~14 GB free root;
        # /opt/hostedtoolcache holds another ~5 GB of language SDKs we
        # don't use. Drop it to keep ~12 GB headroom for pip.
        run: |
          df -h /
          sudo rm -rf /opt/hostedtoolcache
          df -h /

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.lock') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install pinned production deps (requirements.lock)
        # Same artifact as Dockerfile:39-41. --require-hashes makes a
        # tampered or unexpected wheel a build failure with a clear
        # message (the same loud-fail property the prod image relies
        # on per ADR-B6).
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install spaCy models (URL-pinned, mirrors Dockerfile:50-52)
        # Models are published on GitHub Releases, not PyPI, so they
        # sit outside the hashed lock set per ADR-B6. The version
        # embedded in the URL is the pin (en_core_web_sm/trf-3.8.0
        # matches spacy==3.8.14 from the lock).
        run: |
          pip install \
            https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl \
            https://github.com/explosion/spacy-models/releases/download/en_core_web_trf-3.8.0/en_core_web_trf-3.8.0-py3-none-any.whl

      - name: Collect tests/v2 (R10 — 0 collection errors)
        run: python -m pytest tests/v2 --collect-only -q

      - name: Run tests/v2 (full directory, NOT a hand-list)
        run: python -m pytest tests/v2 -v
