# /etc/nginx/sites-available/wordcracker
#
# Two virtual hosts behind the Cloudflare Tunnel:
#   slovoeb.net         → chat_server :8890   (Basic Auth)
#   status.slovoeb.net  → status_server :8889 (Basic Auth)
#
# Both listen only on 127.0.0.1:8080 because cloudflared on the same host
# is the only thing that talks to nginx. There's no public TCP port.
#
# Install:
#   sudo cp nginx_wordcracker.conf /etc/nginx/sites-available/wordcracker
#   sudo ln -sf /etc/nginx/sites-available/wordcracker /etc/nginx/sites-enabled/wordcracker
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 127.0.0.1:8080;
    server_name slovoeb.net;

    auth_basic           "wordcracker chat";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # The chat page does a fetch('/api/chat') from the browser — CF Tunnel
    # forwards a single POST that may take up to 5 min while the agent loops.
    client_max_body_size 2m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_buffering      off;        # let streamed answers reach the client
    proxy_http_version   1.1;

    location / {
        proxy_pass         http://127.0.0.1:8890;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name admin.slovoeb.net;

    auth_basic           "wordcracker admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # upload может быть жирным
    client_max_body_size 4096m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_request_buffering off;     # stream large uploads straight to upstream

    location / {
        proxy_pass         http://127.0.0.1:8891;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name status.slovoeb.net;

    auth_basic           "wordcracker status";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:8889;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
