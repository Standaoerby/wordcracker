services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      # `ollama list` is built into the binary, hits the local API, and fails
      # if either GPU or API is degraded. wget/curl are NOT in the ollama
      # minimal image, so don't reach for them here.
      test: ["CMD-SHELL", "nvidia-smi -L >/dev/null 2>&1 && ollama list >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 90s

  gutenberg-lab:
    environment:
      - OLLAMA_HOST=http://ollama:11434
