services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      # GPU lost? nvidia-smi inside the container will fail to init NVML.
      # API down? /api/tags returns non-2xx. ollama_gpu_watcher.sh on the host
      # acts on unhealthy → docker compose recreate.
      test: ["CMD-SHELL", "nvidia-smi -L >/dev/null 2>&1 && wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 90s

  gutenberg-lab:
    environment:
      - OLLAMA_HOST=http://ollama:11434
