services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /data/ollama:/root/.ollama
    deploy:
      resources:
        # qwen3:14b lives in VRAM (~14 GB), the host RAM footprint of the ollama
        # serve process is tiny (~1 GB). 16 GB cap protects against runaway
        # mmap loading of a larger model someone might pull later.
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      # `ollama list` is built into the binary, hits the local API, and fails
      # if either GPU or API is degraded. wget/curl are NOT in the ollama
      # minimal image, so don't reach for them here.
      test: ["CMD-SHELL", "nvidia-smi -L >/dev/null 2>&1 && ollama list >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 90s

  gutenberg-lab:
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ASSISTANT_NAME=Словоёб
      # Sprint 22+ alpha5 — Token Budget Layer override. Bump qwen3:14b
      # ctx from default 8192 to 16384 (~2× headroom). With this, the
      # Christie 200-word case fits comfortably without ladder shrink.
      # Lower budgeted utilization = lower confabulation risk.
      # Set to 32768 if VRAM allows and longer queries are common.
      - WC_OLLAMA_NUM_CTX=16384
      # Sprint 20+ alpha1 — v4 LLM planner (qwen3:14b with format=json,
      # PlanSpec DAG) takes over for followup turns (Stan's Path 3) +
      # compound queries. Closes R12 Q11/Q12 (translate / export
      # followup) and R13 Q17 (Hemingway copyright). On since R12-R13
      # transition; committed here so future `git pull` doesn't wipe it.
      - WC_LLM_PLANNER=on
      # ─────────────────────────────────────────────────────────────
      # v5 architecture rollout — see vault/v5_deploy_guide.md
      # ─────────────────────────────────────────────────────────────
      # Stage 1 — pure observability (ACTIVE).
      # Adds v5_* fields to JSONL queries-*.jsonl. No behaviour change.
      # Safe to revert: `git checkout HEAD docker-compose.override.yml`
      # then `docker compose up -d` puts you back to v3.2.0-alpha4.
      - WC_V5_FOUNDATION=on
      - WC_V5_PIPELINE=on
      # Stage 2 — entity resolver (NFKC + RU lemmatize + prominence rank).
      # Closes B-R14-4 (homoglyph), B-R14-9 (RU genitive), B-R14-13 (Hugo→Ganz).
      - WC_V5_RESOLVER=on
      # Stage 3 (WC_V5_RENDERER) + Stage 4 (WC_V5_PROSE) were carried as
      # commented dark flags. Phase 0 (2026-05-22) decision per
      # REFACTOR_BRIEF: both branches are NOT enabled in prod and the
      # commented entries are dropped from compose (no dark flags rule).
      # Final fate — enable or delete — is decided in Phase 1 ("схлопнуть
      # поколения"). See docs/v2/decisions.md.
