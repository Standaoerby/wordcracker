# Dev-only override. D-SB1-1: this file is AUTO-applied by bare
# `docker compose up` (dev path). It is NOT applied on prod, because
# systemd invokes compose with `-f docker-compose.yml` explicitly
# (D-SB1-6) which skips override.
#
# Two dev conveniences live here:
#   1. WC_IMAGE_TAG falls back to `dev` when unset, so bare
#      `docker compose up` works without an .env file. Prod has no
#      fallback — see docker-compose.yml.
#   2. Code paths bind-mount from the host so edit-and-reload works
#      against the running container. Prod uses the baked-in image
#      content from Dockerfile COPY.

services:
  gutenberg-lab:
    image: wordcracker-textlab:${WC_IMAGE_TAG:-dev}
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
      - ./data:/workspace/data
      - ./raw_books:/workspace/raw_books
