# Dev-only opt-in overlay. After D-SB1-7 (rename from
# docker-compose.override.yml), this file is **not** auto-applied by
# bare `docker compose up`. Bare `docker compose up` on the prod host
# now loads only docker-compose.yml — the safe default.
#
# Dev opt-in is explicit:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# or via .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
# Either way is greppable. The previous "magic auto-merge of override
# .yml" silently turned dev shape on whenever an operator ran bare
# `docker compose up` on prod — the failure mode D-SB1-7 closes.
#
# Three dev conveniences live here:
#   1. WC_IMAGE_TAG falls back to `dev` when unset, so dev opt-in
#      works without an .env file.
#   2. Code paths bind-mount from the host so edit-and-reload works
#      against the running container. Prod uses the baked-in image
#      content from Dockerfile COPY.
#   3. After S-B2 (D-SB2-1) `chat` and `admin` are first-class compose
#      services. To keep dev edit-and-reload for chat_server.py /
#      admin_server.py, both services pick up the same image fallback
#      and the same `./scripts` bind-mount.

services:
  gutenberg-lab:
    image: wordcracker-textlab:${WC_IMAGE_TAG:-dev}
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
      - ./data:/workspace/data
      - ./raw_books:/workspace/raw_books

  chat:
    image: wordcracker-textlab:${WC_IMAGE_TAG:-dev}
    volumes:
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests

  admin:
    image: wordcracker-textlab:${WC_IMAGE_TAG:-dev}
    volumes:
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
